[pytest]
testpaths = ../../../../../../lib/code/test/python/lib/util_claude
asyncio_mode = auto
# importlib mode: pytest imports test files directly without adding their
# parent directories to sys.path. This prevents the test package "util_claude/"
# (which has __init__.py) from shadowing the library package of the same name.
# PYTHONPATH must include the lib source root so util_claude resolves correctly:
#   PYTHONPATH=<repo>/lib/code/python/lib pytest
addopts = --import-mode=importlib
